version: 2

# Try using these source definitions instead!
sources:
  - name: youtube
    schema: "youtube"
    description: YouTube data including playlists, videos, and playlist-video relationships
    tables:
      - name: playlists
        description: One record per playlist created by a user
      - name: videos
        description: One record per video uploaded by a user
      - name: playlist_videos
        description: One record per video included in a playlist
        config:
          loaded_at_field: ingested_at
